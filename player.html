<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shaka Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #video-container { width: 100%; height: 100%; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" autoplay controls></video>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get('batchId');
        const sId = params.get('subjectId');
        const cId = params.get('childId');
        const vId = params.get('videoId');

        async function initPlayer() {
            const video = document.getElementById('video');
            const player = new shaka.Player(video);

            try {
                const urlRes = await fetch(`https://devcoderz-api.vercel.app/api/video-url?batchId=${bId}&subjectId=${sId}&childId=${cId}&videoId=${vId}`);
                const urlData = await urlRes.json();
                const manifestUrl = urlData.data.url + urlData.data.signedUrl;

                const keyRes = await fetch(`https://devcoderz-api.vercel.app/api/key?mpdUrl=${encodeURIComponent(manifestUrl)}`);
                const keyData = await keyRes.json();

                player.configure({
                    drm: {
                        clearKeys: {
                            [keyData.keyid]: keyData.key
                        }
                    }
                });

                await player.load(manifestUrl);
            } catch (e) {
                console.error("Error loading player:", e);
            }
        }
        initPlayer();
    </script>
</body>
</html>
