<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
</head>
<body>
    <video id="video" autoplay controls style="width:100%"></video>
    <script>
        const API_BASE = "https://devcoderz-api.vercel.app";
        const PROXY_URL = "https://rangexcoder-backend.onrender.com/apiserver/api/pi/play?url=";

        async function initPlayer() {
            const params = new URLSearchParams(window.location.search);
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            
            try {
                const urlRes = await fetch(`${API_BASE}/api/video-url?batchId=${params.get('batchId')}&subjectId=${params.get('subjectId')}&childId=${params.get('childId')}&videoId=${params.get('videoId')}`);
                const urlData = await urlRes.json();
                const manifest = urlData.data.url + urlData.data.signedUrl;

                const kidRes = await fetch(`${API_BASE}/api/key?mpdUrl=${encodeURIComponent(manifest)}`);
                const kidData = await kidRes.json();

                const keyRes = await fetch(`${API_BASE}/api/get-otp?kid=${kidData.kid}`);
                const keyData = await keyRes.json();

                player.configure({
                    drm: {
                        clearKeys: { [keyData.keyid]: keyData.key }
                    }
                });

                // Yahan manifest ko Proxy ke through load kar rahe hain
                const proxiedManifest = PROXY_URL + encodeURIComponent(manifest);
                await player.load(proxiedManifest);
                
            } catch (e) {
                console.error("Player Exception:", e);
                document.body.innerHTML = "Error: " + e.message;
            }
        }
        document.addEventListener('shaka-ui-loaded', initPlayer);
    </script>
</body>
</html>
