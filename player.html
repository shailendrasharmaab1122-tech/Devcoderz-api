<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
</head>
<body>
    <video id="video" width="100%" controls autoplay></video>
    <script>
        function hexToBytes(hex) {
            let bytes = new Uint8Array(hex.length / 2);
            for (let i = 0; i < hex.length; i += 2) bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
            return bytes;
        }

        function toBase64(bytes) {
            return btoa(String.fromCharCode(...bytes)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        async function initPlayer() {
            const params = new URLSearchParams(window.location.search);
            const bId = params.get('batchId');
            const sId = params.get('subjectId');
            const cId = params.get('childId');
            const vId = params.get('videoId');

            if (!bId || !sId || !cId || !vId) {
                alert("Missing parameters in URL!");
                return;
            }

            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            
            try {
                const urlRes = await fetch(`https://devcoderz-api.vercel.app/api/video-url?batchId=${bId}&subjectId=${sId}&childId=${cId}&videoId=${vId}`);
                const urlData = await urlRes.json();
                const manifestUrl = urlData.data.url + urlData.data.signedUrl;

                const kidRes = await fetch(`https://devcoderz-api.vercel.app/api/key?mpdUrl=${encodeURIComponent(manifestUrl)}`);
                const kidData = await kidRes.json();

                const keyRes = await fetch(`https://devcoderz-api.vercel.app/api/get-otp?kid=${kidData.kid}`);
                const keyData = await keyRes.json();

                const kidB64 = toBase64(hexToBytes(keyData.keyid));
                const keyB64 = toBase64(hexToBytes(keyData.key));

                player.configure({
                    drm: {
                        clearKeys: {
                            [kidB64]: keyB64
                        }
                    }
                });

                await player.load(manifestUrl);
            } catch (e) {
                console.error("Error:", e);
                alert("Playback failed: " + e.message);
            }
        }
        initPlayer();
    </script>
</body>
</html>
