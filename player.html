<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.0/shaka-player.compiled.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        video { width: 100%; max-width: 900px; }
    </style>
</head>
<body>
    <video id="video" controls autoplay></video>
    <script>
        const video = document.getElementById('video');
        const player = new shaka.Player(video);
        const urlParams = new URLSearchParams(window.location.search);
        
        async function init() {
            try {
                const bId = urlParams.get('batchId'), sId = urlParams.get('subjectId'), cId = urlParams.get('childId'), vId = urlParams.get('videoId');
                
                const response = await fetch(`https://rangexcoder-backend.onrender.com/api/get-video-url?batchId=${bId}&subjectId=${sId}&childId=${cId}&videoId=${vId}&accessToken=&refreshToken=`);
                const data = await response.json();
                
                const masterUrl = "https://rangexcoder-backend.onrender.com" + data.data.url + data.data.signedUrl;
                const signedParams = data.data.signedUrl.replace('?', '');

                const mpdResponse = await fetch(masterUrl);
                const mpdText = await mpdResponse.text();
                const kidMatch = mpdText.match(/default_KID="([^"]+)"/i);
                const kid = kidMatch ? kidMatch[1].replace(/-/g, "").toLowerCase() : null;

                const keyResponse = await fetch(`https://rangexcoder-backend.onrender.com/api/get-otp?kid=${kid}&accessToken=&refreshToken=`);
                const keyData = await keyResponse.json();
                const key = keyData.clearKeys[kid];

                player.configure({
                    drm: { clearKeys: { [kid]: key } }
                });

                player.getNetworkingEngine().registerRequestFilter((type, request) => {
                    if (type === shaka.net.NetworkingEngine.RequestType.SEGMENT || type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
                        request.uri += (request.uri.includes('?') ? '&' : '?') + signedParams;
                    }
                });

                await player.load(masterUrl);
            } catch (e) { 
                console.error(e);
            }
        }
        init();
    </script>
</body>
</html>
