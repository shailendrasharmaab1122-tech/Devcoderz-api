<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaka Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.4/shaka-player.compiled.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        video { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <video id="video" controls autoplay></video>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bId = params.get("batchId");
        const lId = params.get("lectureId");
        const sId = params.get("subjectId");

        async function initPlayer() {
            const video = document.getElementById('video');
            const player = new shaka.Player(video);

            try {
                const res = await fetch(`https://devcoderz-player.vercel.app/api/stream.js?batchId=${bId}&lectureId=${lId}&subjectId=${sId}`);
                const data = await res.json();

                if (data.drmKeys && data.drmKeys.clearKeys) {
                    player.configure({
                        drm: {
                            clearKeys: data.drmKeys.clearKeys
                        }
                    });
                }

                await player.load(data.url);
            } catch (e) {
                console.error("Error:", e);
                alert("Playback Failed");
            }
        }

        document.addEventListener('DOMContentLoaded', initPlayer);
    </script>
</body>
</html>
