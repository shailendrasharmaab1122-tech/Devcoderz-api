<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">
</head>
<body>
    <video id="video" width="100%" controls autoplay></video>
    <script>
        const API_BASE = "https://devcoderz-api.vercel.app";

        async function initPlayer() {
            const params = new URLSearchParams(window.location.search);
            const video = document.getElementById('video');
            const player = new shaka.Player(video);
            
            try {
                // 1. Fetch URL
                const urlRes = await fetch(`${API_BASE}/api/video-url?batchId=${params.get('batchId')}&subjectId=${params.get('subjectId')}&childId=${params.get('childId')}&videoId=${params.get('videoId')}`);
                const urlData = await urlRes.json();
                const manifestUrl = urlData.data.url + urlData.data.signedUrl;

                // 2. Fetch KID
                const kidRes = await fetch(`${API_BASE}/api/key?mpdUrl=${encodeURIComponent(manifestUrl)}`);
                const kidData = await kidRes.json();

                // 3. Fetch Keys
                const keyRes = await fetch(`${API_BASE}/api/get-otp?kid=${kidData.kid}`);
                const keyData = await keyRes.json();

                // 4. Configure DRM - Using Hex format directly
                player.configure({
                    drm: {
                        clearKeys: {
                            [keyData.keyid]: keyData.key
                        }
                    }
                });

                // 5. Load
                await player.load(manifestUrl);
                console.log("Playback started!");
            } catch (e) {
                console.error("DEBUG ERROR:", e);
                // Yeh error window pe dikha dega
                document.body.innerHTML += `<div style="color:red">Error: ${e.message}</div>`;
            }
        }
        
        // Error events catch karne ke liye
        document.addEventListener('shaka-ui-loaded', initPlayer);
        initPlayer();
    </script>
</body>
</html>
